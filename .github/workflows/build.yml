name: Build

on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'
    
    - name: Setup signing
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
        cat > app/keystore.properties << EOF
        storeFile=keystore.jks
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        EOF
    
    - name: Get version
      id: version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Build APK
      run: chmod +x gradlew && ./gradlew --no-daemon clean assembleRelease
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: XPrivacyLua-NG-v${{ steps.version.outputs.version }}
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: "v${{ steps.version.outputs.version }}"
        tag_name: "v${{ steps.version.outputs.version }}"
        draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft || false }}
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
