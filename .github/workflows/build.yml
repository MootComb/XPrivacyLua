name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]
      draft:
        description: 'Create as draft'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'
    
    - name: Setup signing
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
        cat > keystore.properties << EOF
        storeFile=keystore.jks
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        EOF
    
    - name: Set version
      id: version
      run: |
        CURRENT=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
        
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ github.event.inputs.release_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          sed -i "s/versionName \".*\"/versionName \"$NEW_VERSION\"/" app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode $(date +%s | cut -c5-10)/" app/build.gradle
        else
          NEW_VERSION="${GITHUB_REF_NAME#v}"
        fi
        
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
    
    - name: Build APK
      run: chmod +x gradlew && ./gradlew --no-daemon clean assembleRelease
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: XPrivacyLua-NG-v${{ steps.version.outputs.version }}
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: "v${{ steps.version.outputs.version }}"
        tag_name: "v${{ steps.version.outputs.version }}"
        draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft || false }}
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
