name: Build Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'
    
    - name: Setup signing
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
        cat > keystore.properties << EOF
        storeFile=keystore.jks
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        EOF
    
    - name: Get version
      id: version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Build APK
      run: chmod +x gradlew && ./gradlew --no-daemon clean assembleRelease
    
    - name: Rename APK
      run: |
        mv app/build/outputs/apk/release/*.apk "app/build/outputs/apk/release/XPrivacyLua-${{ steps.version.outputs.version }}.apk"
    
    - name: Get APK hashes
      id: hashes
      run: |
        APK="app/build/outputs/apk/release/XPrivacyLua-${{ steps.version.outputs.version }}.apk"
        echo "md5=$(md5sum "$APK" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
        echo "sha1=$(sha1sum "$APK" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
        echo "sha256=$(sha256sum "$APK" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: XPrivacyLua-${{ steps.version.outputs.version }}
        path: app/build/outputs/apk/release/XPrivacyLua-${{ steps.version.outputs.version }}.apk
        retention-days: 90
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: "XPrivacyLua ${{ steps.version.outputs.version }}"
        tag_name: "v${{ steps.version.outputs.version }}"
        body: |
          ## XPrivacyLua ${{ steps.version.outputs.version }}
          
          **Build Date:** $(date +'%Y-%m-%d %H:%M UTC')
          
          ### File Hashes
          | Algorithm | Hash |
          |-----------|------|
          | MD5 | `${{ steps.hashes.outputs.md5 }}` |
          | SHA-1 | `${{ steps.hashes.outputs.sha1 }}` |
          | SHA-256 | `${{ steps.hashes.outputs.sha256 }}` |
          
          ### Installation
          1. Install [Magisk](https://github.com/topjohnwu/Magisk)
          2. Install [LSPosed](https://github.com/LSPosed/LSPosed) (Android 8+)
          3. Download and install XPrivacyLua-${{ steps.version.outputs.version }}.apk
          4. Open LSPosed → Modules → Enable XPrivacyLua
          5. Set scope in module settings
          6. Reboot
        files: app/build/outputs/apk/release/XPrivacyLua-${{ steps.version.outputs.version }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
