name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      draft:
        description: 'Create as draft'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept Android SDK licenses
      run: |
        yes | sdkmanager --licenses
    
    - name: Install required SDK components
      run: |
        sdkmanager "platforms;android-34"
        sdkmanager "build-tools;34.0.0"
    
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
    
    - name: Create keystore.properties
      run: |
        cat > keystore.properties << EOF
        storeFile=keystore.jks
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        EOF
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Get current version
      id: current_version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
        echo "current=$VERSION" >> $GITHUB_OUTPUT
        echo "Current version: $VERSION"
    
    - name: Bump version
      id: bump_version
      if: github.event_name == 'workflow_dispatch'
      run: |
        CURRENT="${{ steps.current_version.outputs.current }}"
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
        
        case "${{ github.event.inputs.release_type }}" in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
        esac
        
        NEW_VERSION="${MAJOR}.${MINOR}"
        echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
        echo "Version bumped to: $NEW_VERSION"
    
    - name: Update version in build.gradle
      if: github.event_name == 'workflow_dispatch'
      run: |
        sed -i "s/versionName \".*\"/versionName \"${{ steps.bump_version.outputs.new }}\"/" app/build.gradle
        sed -i "s/versionCode [0-9]*/versionCode $(date +%s | cut -c5-10)/" app/build.gradle
    
    - name: Build Release APK
      if: secrets.KEYSTORE_BASE64 != ''
      run: |
        ./gradlew --no-daemon clean
        ./gradlew --no-daemon assembleRelease
    
    - name: Build Debug APK
      run: |
        ./gradlew --no-daemon assembleDebug
    
    - name: Verify APK
      run: |
        ls -la app/build/outputs/apk/release/
        ls -la app/build/outputs/apk/debug/
    
    - name: Get final version
      id: final_version
      run: |
        if [ "${{ github.event_name }}" == "push" ]; then
          VERSION=${GITHUB_REF_NAME#v}
        else
          VERSION="${{ steps.bump_version.outputs.new }}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "VERSION=$VERSION" >> $GITHUB_ENV
    
    - name: Rename APK files
      run: |
        VERSION="${{ steps.final_version.outputs.version }}"
        BUILD_DATE=$(date +'%Y%m%d')
        if [ -f app/build/outputs/apk/release/*.apk ]; then
          mv app/build/outputs/apk/release/*.apk "app/build/outputs/apk/release/XPrivacyLua-NG-v${VERSION}-release-${BUILD_DATE}.apk"
        fi
        if [ -f app/build/outputs/apk/debug/*.apk ]; then
          mv app/build/outputs/apk/debug/*.apk "app/build/outputs/apk/debug/XPrivacyLua-NG-v${VERSION}-debug-${BUILD_DATE}.apk"
        fi
    
    - name: Upload Release APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: XPrivacyLua-NG-v${{ steps.final_version.outputs.version }}-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90
    
    - name: Upload Debug APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: XPrivacyLua-NG-v${{ steps.final_version.outputs.version }}-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: "XPrivacyLua NG v${{ steps.final_version.outputs.version }}"
        tag_name: "v${{ steps.final_version.outputs.version }}"
        body_path: CHANGELOG_TEMP.md
        draft: ${{ github.event.inputs.draft == 'true' || false }}
        prerelease: false
        generate_release_notes: true
        files: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create Release without signing
      uses: softprops/action-gh-release@v1
      with:
        name: "XPrivacyLua NG v${{ steps.final_version.outputs.version }} (debug only)"
        tag_name: "v${{ steps.final_version.outputs.version }}-debug"
        body_path: CHANGELOG_TEMP.md
        draft: ${{ github.event.inputs.draft == 'true' || false }}
        prerelease: true
        generate_release_notes: true
        files: |
          app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
